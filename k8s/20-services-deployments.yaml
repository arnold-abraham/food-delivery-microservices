apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: food
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8079
      targetPort: 8079
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:0.0.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8079
              name: http
          envFrom:
            - configMapRef:
                name: food-config
            - secretRef:
                name: food-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8079
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8079
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: food
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:0.0.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DB_NAME
              value: userdb
          envFrom:
            - configMapRef:
                name: food-config
            - secretRef:
                name: food-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
---
