apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: food
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: food
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: fooddb
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: food-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-secrets
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
            items:
              - key: init.sql
                path: init.sql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: food
data:
  init.sql: |
    CREATE DATABASE userdb OWNER food TEMPLATE template1;
    CREATE DATABASE restaurantdb OWNER food TEMPLATE template1;
    CREATE DATABASE orderdb OWNER food TEMPLATE template1;
    CREATE DATABASE deliverydb OWNER food TEMPLATE template1;

    GRANT ALL PRIVILEGES ON DATABASE userdb TO food;
    GRANT ALL PRIVILEGES ON DATABASE restaurantdb TO food;
    GRANT ALL PRIVILEGES ON DATABASE orderdb TO food;
    GRANT ALL PRIVILEGES ON DATABASE deliverydb TO food;
