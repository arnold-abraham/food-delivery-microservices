apiVersion: v1
kind: Secret
metadata:
  name: food-secrets
  namespace: food
type: Opaque
stringData:
  DB_USER: "food"
  DB_PASSWORD: "food"
  # Generate a real value with: openssl rand -base64 48
  # Then replace REPLACE_WITH_STRONG_SECRET below before applying to any cluster.
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET"

