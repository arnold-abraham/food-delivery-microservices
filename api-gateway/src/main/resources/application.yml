server:
  port: 8079

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # Required — no default. Must match user-service JWT_SECRET. Generate with: openssl rand -base64 48
          secret: ${JWT_SECRET}
  cloud:
    gateway:
      # Allow browser access (dev-friendly). Tighten for production.
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
      routes:
        - id: auth
          uri: http://user-service:8081
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**
        - id: restaurant-service
          uri: http://restaurant-service:8082
          predicates:
            - Path=/restaurants/**
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/orders/**
        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/payments/**
        - id: delivery-service
          uri: http://delivery-service:8086
          predicates:
            - Path=/deliveries/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
