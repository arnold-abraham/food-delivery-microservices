server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:userdb}
    username: ${DB_USER:food}
    password: ${DB_PASSWORD:food}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    # Required — no default. Generate with: openssl rand -base64 48
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
